<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Prodigious Cuts</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --gold:#C8A96E; --gold-light:#E2CA9E; --dark:#0D0D0D; --dark-2:#1A1A1A; --dark-3:#252525; --white:#FAFAFA; --gray:#999; --radius:12px; }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--white);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 40%,rgba(200,169,110,0.07) 0%,transparent 60%);pointer-events:none;}

    .logo-wrap{text-align:center;margin-bottom:32px;}
    .logo-wrap img{height:56px;border-radius:8px;}

    .card{background:var(--dark-2);border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:36px 32px;width:100%;max-width:420px;position:relative;z-index:1;}

    .tabs{display:flex;background:var(--dark-3);border-radius:10px;padding:4px;margin-bottom:28px;gap:4px;}
    .tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:600;border-radius:8px;cursor:pointer;color:var(--gray);transition:all 0.2s;}
    .tab.active{background:var(--gold);color:var(--dark);}

    .form-panel{display:none;}
    .form-panel.active{display:block;}

    h2{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:6px;}
    .subtitle{color:var(--gray);font-size:14px;margin-bottom:24px;}

    .form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
    label{font-size:12px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:1px;}
    input{background:var(--dark-3);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius);padding:13px 16px;color:var(--white);font-size:15px;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.2s;}
    input:focus{border-color:var(--gold);}
    input::placeholder{color:var(--gray);}

    .btn{width:100%;padding:14px;border-radius:var(--radius);font-weight:600;font-size:15px;border:none;cursor:pointer;transition:all 0.3s;margin-top:8px;}
    .btn-primary{background:var(--gold);color:var(--dark);}
    .btn-primary:hover{background:var(--gold-light);transform:translateY(-1px);}
    .btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none;}

    .divider{text-align:center;color:var(--gray);font-size:13px;margin:20px 0;position:relative;}
    .divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(255,255,255,0.07);}
    .divider span{background:var(--dark-2);padding:0 12px;position:relative;}

    .back-link{text-align:center;margin-top:20px;}
    .back-link a{color:var(--gold);text-decoration:none;font-size:14px;}

    /* Toast */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--dark-3);border:1px solid rgba(255,255,255,0.1);color:var(--white);padding:14px 22px;border-radius:12px;font-size:14px;z-index:999;transition:transform 0.3s ease;white-space:nowrap;}
    .toast.show{transform:translateX(-50%) translateY(0);}
    .toast.success{border-color:rgba(200,169,110,0.4);color:var(--gold);}
    .toast.error{border-color:rgba(255,80,80,0.4);color:#ff6b6b;}
  </style>
</head>
<body>
  <div class="logo-wrap">
    <a href="index.html"><img src="logo.jpg" alt="Prodigious Cuts"></a>
  </div>

  <div class="card">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Log In</div>
      <div class="tab" onclick="switchTab('register')">Create Account</div>
    </div>

    <!-- Login -->
    <div class="form-panel active" id="panel-login">
      <h2>Welcome back</h2>
      <p class="subtitle">Log in to manage your appointments.</p>
      <form id="login-form" onsubmit="doLogin(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="l-email" placeholder="you@email.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="l-pass" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" id="login-btn">Log In</button>
      </form>
    </div>

    <!-- Register -->
    <div class="form-panel" id="panel-register">
      <h2>Create account</h2>
      <p class="subtitle">Book faster, track your appointments.</p>
      <form id="register-form" onsubmit="doRegister(event)">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="r-name" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="r-email" placeholder="you@email.com" required>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="r-phone" placeholder="(205) 000-0000">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="r-pass" placeholder="Min. 6 characters" required minlength="6">
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="r-pass2" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" id="register-btn">Create Account</button>
      </form>
    </div>

    <div class="back-link"><a href="index.html">← Back to homepage</a></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // Switch to register tab if hash is #register
    if (window.location.hash === '#register') switchTab('register');

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
      document.getElementById('panel-login').classList.toggle('active', tab==='login');
      document.getElementById('panel-register').classList.toggle('active', tab==='register');
    }

    function showToast(msg, type='') {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = 'toast show ' + type;
      setTimeout(() => t.classList.remove('show'), 3500);
    }

    function setLoading(btnId, loading) {
      const b = document.getElementById(btnId);
      b.disabled = loading;
      b.textContent = loading ? 'Please wait...' : (btnId==='login-btn' ? 'Log In' : 'Create Account');
    }

    async function doLogin(e) {
      e.preventDefault();
      setLoading('login-btn', true);
      try {
        const res = await fetch('/api/login', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({email: document.getElementById('l-email').value, password: document.getElementById('l-pass').value})
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        localStorage.setItem('pc_token', data.token);
        localStorage.setItem('pc_user', JSON.stringify(data.user));
        showToast('Logged in! Redirecting...', 'success');
        setTimeout(() => { window.location = sessionStorage.getItem('pc_redirect') || 'account.html'; }, 900);
      } catch(err) { showToast(err.message, 'error'); }
      finally { setLoading('login-btn', false); }
    }

    async function doRegister(e) {
      e.preventDefault();
      if (document.getElementById('r-pass').value !== document.getElementById('r-pass2').value) {
        return showToast('Passwords do not match', 'error');
      }
      setLoading('register-btn', true);
      try {
        const res = await fetch('/api/register', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({
            name: document.getElementById('r-name').value,
            email: document.getElementById('r-email').value,
            phone: document.getElementById('r-phone').value,
            password: document.getElementById('r-pass').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Registration failed');
        localStorage.setItem('pc_token', data.token);
        localStorage.setItem('pc_user', JSON.stringify(data.user));
        showToast('Account created! Redirecting...', 'success');
        setTimeout(() => { window.location = 'book.html'; }, 900);
      } catch(err) { showToast(err.message, 'error'); }
      finally { setLoading('register-btn', false); }
    }
  </script>
</body>
</html>
