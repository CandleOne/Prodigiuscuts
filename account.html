<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account — Prodigious Cuts</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'ZADOBESY Regular';
      src: url('ZADOBESY-Regular.ttf') format('truetype');
      font-style: normal;
      font-weight: 400;
      font-display: swap;
    }

    :root{--gold:#C8A96E;--gold-light:#E2CA9E;--dark:#0D0D0D;--dark-2:#1A1A1A;--dark-3:#252525;--white:#FAFAFA;--gray:#999;--radius:12px;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--white);min-height:100vh;}

    .top-bar{position:fixed;top:0;left:0;right:0;z-index:100;padding:14px 20px;background:rgba(13,13,13,0.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;}
    .top-bar a{color:var(--white);text-decoration:none;font-size:14px;}
    .top-bar a:hover{color:var(--gold);}
    .top-bar img{height:40px;border-radius:6px;}

    .page{padding:90px 20px 40px;max-width:600px;margin:0 auto;}

    /* Profile header */
    .profile-card{background:var(--dark-2);border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:28px;display:flex;align-items:center;gap:20px;margin-bottom:24px;}
    .avatar{width:64px;height:64px;border-radius:50%;background:rgba(200,169,110,0.15);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:24px;font-weight:800;color:var(--gold);flex-shrink:0;}
    .profile-info h2{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:2px;}
    .profile-info p{color:var(--gray);font-size:13px;}

    /* Tabs */
    .tabs{display:flex;background:var(--dark-2);border-radius:12px;padding:4px;margin-bottom:24px;gap:4px;}
    .tab{flex:1;padding:10px 8px;text-align:center;font-size:13px;font-weight:600;border-radius:9px;cursor:pointer;color:var(--gray);transition:all 0.2s;}
    .tab.active{background:var(--gold);color:var(--dark);}

    .tab-panel{display:none;}
    .tab-panel.active{display:block;}

    /* Appointment cards */
    .appt-card{background:var(--dark-2);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:18px;margin-bottom:12px;transition:border-color 0.2s;}
    .appt-card:hover{border-color:rgba(200,169,110,0.15);}
    .appt-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
    .appt-service{font-weight:700;font-size:16px;}
    .appt-price{color:var(--gold);font-family:'Playfair Display',serif;font-size:18px;font-weight:800;}
    .appt-meta{color:var(--gray);font-size:13px;display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px;}
    .appt-meta span{display:flex;align-items:center;gap:4px;}
    .status{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;}
    .status-pending{background:rgba(255,200,50,0.12);color:#ffc832;}
    .status-confirmed{background:rgba(200,169,110,0.15);color:var(--gold);}
    .status-completed{background:rgba(80,200,120,0.12);color:#50c878;}
    .status-cancelled{background:rgba(255,80,80,0.1);color:#ff6b6b;}
    .btn-cancel{background:none;border:1px solid rgba(255,80,80,0.3);color:#ff6b6b;padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;}
    .btn-cancel:hover{background:rgba(255,80,80,0.1);}

    .empty{text-align:center;padding:48px 20px;color:var(--gray);}
    .empty .icon{font-size:48px;margin-bottom:12px;opacity:0.4;}
    .empty p{font-size:15px;margin-bottom:20px;}

    /* Edit profile */
    .form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
    label{font-size:12px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:1px;}
    input{background:var(--dark-3);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius);padding:13px 16px;color:var(--white);font-size:15px;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.2s;}
    input:focus{border-color:var(--gold);}

    .btn{padding:13px 24px;border-radius:var(--radius);font-weight:600;font-size:14px;border:none;cursor:pointer;transition:all 0.3s;}
    .btn-primary{background:var(--gold);color:var(--dark);}
    .btn-primary:hover{background:var(--gold-light);}
    .btn-danger{background:rgba(255,80,80,0.1);color:#ff6b6b;border:1px solid rgba(255,80,80,0.2);}
    .btn-danger:hover{background:rgba(255,80,80,0.2);}

    .section-title{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:20px;}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--dark-3);border:1px solid rgba(255,255,255,0.1);color:var(--white);padding:14px 22px;border-radius:12px;font-size:14px;z-index:999;transition:transform 0.3s ease;white-space:nowrap;}
    .toast.show{transform:translateX(-50%) translateY(0);}
    .toast.success{border-color:rgba(200,169,110,0.4);color:var(--gold);}
    .toast.error{border-color:rgba(255,80,80,0.4);color:#ff6b6b;}
  </style>
</head>
<body>

  <div class="top-bar">
    <a href="index.html">← Home</a>
    <a href="index.html"><img src="logo.png" alt="Prodigious Cuts"></a>
    <a href="book.html" style="color:var(--gold);font-weight:600;">+ Book</a>
  </div>

  <div class="page" id="page">
    <!-- Redirect to login if not authenticated (handled in JS) -->
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const token = localStorage.getItem('pc_token');
    const user = JSON.parse(localStorage.getItem('pc_user') || 'null');

    if (!token || !user) {
      sessionStorage.setItem('pc_redirect', 'account.html');
      window.location = 'login.html';
    }

    function showToast(msg, type='') {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = 'toast show ' + type;
      setTimeout(() => t.classList.remove('show'), 3500);
    }

    function statusClass(s) {
      return {pending:'status-pending',confirmed:'status-confirmed',completed:'status-completed',cancelled:'status-cancelled'}[s] || 'status-pending';
    }

    function getAppointmentDayStart(dateText) {
      const parts = String(dateText || '').split('-');
      if (parts.length === 3) {
        const y = Number(parts[0]);
        const m = Number(parts[1]) - 1;
        const d = Number(parts[2]);
        if (!Number.isNaN(y) && !Number.isNaN(m) && !Number.isNaN(d)) {
          return new Date(y, m, d);
        }
      }

      const fallback = new Date(dateText);
      fallback.setHours(0, 0, 0, 0);
      return fallback;
    }

    function renderAppointments(appts) {
      const todayStart = new Date();
      todayStart.setHours(0, 0, 0, 0);

      const isUpcomingByDay = function(a) {
        const apptDayStart = getAppointmentDayStart(a.date);
        return apptDayStart >= todayStart && a.status !== 'cancelled' && a.status !== 'completed';
      };

      const upcoming = appts.filter(isUpcomingByDay);
      const past = appts.filter(a => !isUpcomingByDay(a));

      function apptCard(a) {
        const isUpcoming = isUpcomingByDay(a);
        const displayPrice = (typeof a.final_price === 'number' || String(a.final_price || '').length)
          ? a.final_price
          : a.price;
        return `<div class="appt-card">
          <div class="appt-top">
            <div class="appt-service">${a.service}</div>
            <div class="appt-price">$${displayPrice || '—'}</div>
          </div>
          <div class="appt-meta">
            <span>📅 ${a.date}</span>
            <span>🕐 ${a.time}</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span class="status ${statusClass(a.status)}">${a.status}</span>
            ${isUpcoming ? `<button class="btn-cancel" onclick="cancelAppt(${a.id})">Cancel</button>` : ''}
          </div>
        </div>`;
      }

      document.getElementById('upcoming-list').innerHTML = upcoming.length
        ? upcoming.map(apptCard).join('')
        : `<div class="empty"><div class="icon">📅</div><p>No upcoming appointments</p><a href="book.html" style="background:var(--gold);color:var(--dark);padding:12px 24px;border-radius:10px;font-weight:600;font-size:14px;text-decoration:none;">Book Now</a></div>`;

      document.getElementById('past-list').innerHTML = past.length
        ? past.map(apptCard).join('')
        : `<div class="empty"><div class="icon">🗂</div><p>No past appointments yet.</p></div>`;
    }

    async function cancelAppt(id) {
      if (!confirm('Cancel this appointment?')) return;
      try {
        const res = await fetch('/api/appointments/' + id + '/cancel', {
          method:'PUT', headers:{'Authorization':'Bearer ' + token, 'Content-Type':'application/json'},
          body: JSON.stringify({status:'cancelled'})
        });
        if (res.ok) { showToast('Appointment cancelled', 'success'); loadAppointments(); }
        else throw new Error('Failed');
      } catch { showToast('Could not cancel. Please call us at (205) 301-9662', 'error'); }
    }

    async function loadAppointments() {
      try {
        const res = await fetch('/api/appointments', {headers:{'Authorization':'Bearer ' + token}});
        if (res.status === 401) { window.location = 'login.html'; return; }
        const data = await res.json();
        renderAppointments(data);
      } catch {
        renderAppointments([]);
      }
    }

    function buildPage() {
      const initials = (user.name || 'U').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
      document.getElementById('page').innerHTML = `
        <div class="profile-card">
          <div class="avatar">${initials}</div>
          <div class="profile-info">
            <h2>${user.name}</h2>
            <p>${user.email}</p>
            ${user.phone ? `<p>${user.phone}</p>` : ''}
          </div>
        </div>

        <div class="tabs">
          <div class="tab active" onclick="switchTab('upcoming')">Upcoming</div>
          <div class="tab" onclick="switchTab('past')">Past</div>
          <div class="tab" onclick="switchTab('profile')">Profile</div>
        </div>

        <div class="tab-panel active" id="tab-upcoming">
          <div id="upcoming-list"><div style="color:var(--gray);padding:20px;text-align:center;">Loading...</div></div>
        </div>

        <div class="tab-panel" id="tab-past">
          <div id="past-list"></div>
        </div>

        <div class="tab-panel" id="tab-profile">
          <div class="section-title">Edit Profile</div>
          <div class="form-group"><label>Full Name</label><input type="text" id="p-name" value="${user.name || ''}"></div>
          <div class="form-group"><label>Phone</label><input type="tel" id="p-phone" value="${user.phone || ''}"></div>
          <div class="form-group"><label>Email</label><input type="email" value="${user.email || ''}" disabled style="opacity:0.5;cursor:not-allowed;"></div>
          <button class="btn btn-primary" onclick="saveProfile()" style="margin-bottom:12px;width:100%;">Save Changes</button>
          <button class="btn btn-danger" onclick="logout()" style="width:100%;">Log Out</button>
        </div>
      `;
      loadAppointments();
    }

    function switchTab(t) {
      document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', ['upcoming','past','profile'][i]===t));
      ['upcoming','past','profile'].forEach(id => {
        const el = document.getElementById('tab-'+id);
        if (el) el.classList.toggle('active', id===t);
      });
    }

    async function saveProfile() {
      const name = document.getElementById('p-name').value.trim();
      const phone = document.getElementById('p-phone').value.trim();
      try {
        const res = await fetch('/api/profile', {
          method:'PUT', headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
          body: JSON.stringify({name, phone})
        });
        if (res.ok) {
          const updated = {...user, name, phone};
          localStorage.setItem('pc_user', JSON.stringify(updated));
          showToast('Profile updated!', 'success');
        } else throw new Error();
      } catch { showToast('Saved locally (server update failed)', 'success'); const updated = {...user, name, phone}; localStorage.setItem('pc_user', JSON.stringify(updated)); }
    }

    function logout() {
      localStorage.removeItem('pc_token');
      localStorage.removeItem('pc_user');
      window.location = 'index.html';
    }

    buildPage();
  </script>
</body>
</html>
